<body class="goto-here">
    <div class="py-1 bg-primary">
        <div class="container">
            <div class="row no-gutters d-flex align-items-start align-items-center px-md-0">
                <div class="col-lg-12 d-block">
                    <div class="row d-flex">
                        <div class="col-md pr-4 d-flex topper align-items-center">

                                    class="icon-phone2"></span></div>

                        </div>
                        <div class="col-md pr-4 d-flex topper align-items-center">
                            <div class="icon mr-2 d-flex justify-content-center align-items-center"><span

    <!-- Navigation (Updated with Login)[cite: 2] -->
    <nav class="navbar navbar-expand-lg navbar-dark ftco_navbar bg-dark ftco-navbar-light" id="ftco-navbar">
        <div class="container">
            <a class="navbar-brand" href="index.html">Vegefoods</a>
            <div class="collapse navbar-collapse" id="ftco-nav">
                <ul class="navbar-nav ml-auto">
                    <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
                    <li class="nav-item"><a href="shop.html" class="nav-link">Shop</a></li>
                    <li class="nav-item active"><a href="login.html" class="nav-link">Login</a></li>
                    <li class="nav-item"><a href="register.html" class="nav-link">Register</a></li>
                    <li class="nav-item cta cta-colored"><a href="cart.html" class="nav-link"><span

    <!-- Breadcrumb Header -->
    <div class="hero-wrap hero-bread" style="background-image: url('images/bg_1.jpg');">
        <div class="container">
            <div class="row no-gutters slider-text align-items-center justify-content-center">
                <div class="col-md-9 ftco-animate text-center">
                    <p class="breadcrumbs"><span class="mr-2"><a href="index.html">Home</a></span> <span>Login</span>
                    </p>
                    <h1 class="mb-0 bread">Login</h1>
                </div>
            </div>
        </div>
    </div>

    <!-- Login Form Section -->
    <section class="ftco-section contact-section bg-light">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6 order-md-last d-flex">
                    <form id="loginForm" class="bg-white p-5 contact-form">
                        <div class="form-group">
                            <input type="email" id="email" class="form-control" placeholder="Your Email" required>
                        </div>
                        <div class="form-group">
                            <input type="password" id="password" class="form-control" placeholder="Password" required>
                        </div>
                        <div class="form-group">
                            <input type="submit" value="Login" class="btn btn-primary py-3 px-5 w-100">
                        </div>
                        <div class="text-center">
                            <p>Don't have an account? <a href="register.html">Register here</a></p>
                        </div>
                        <div id="message" class="mt-3 text-center"></div>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer[cite: 2] -->
    <footer class="ftco-footer ftco-section">
        <div class="container">
            <div class="row mb-5">
                <div class="col-md text-center">
                    <h2 class="ftco-heading-2">Vegefoods</h2>
                    <p>Architecture of Trust - Secure E-commerce Platform</p>
                </div>
            </div>
        </div>
    </footer>

    <!-- Scripts for Handshake Logic -->
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');

            try {
                // Layer 1: POST Request to our Node.js API
                const response = await fetch('http://localhost:3000/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Success: Persistence & Continuity Logic
                    localStorage.setItem('token', data.token); // The Keycard
                    localStorage.setItem('user', JSON.stringify(data.user)); // User Info

                    messageDiv.innerHTML = `<span class="text-success">Login Successful! Redirecting...</span>`;
                    setTimeout(() => { window.location.href = 'index.html'; }, 1500);
                } else {
                    // Security Logic: Generic Error Message[cite: 1]
                    messageDiv.innerHTML = `<span class="text-danger">${data.message}</span>`;
                }
            } catch (error) {
                messageDiv.innerHTML = `<span class="text-danger">Error: Connection to server failed.</span>`;
            }
        });
    </script>
</body>

</html>
