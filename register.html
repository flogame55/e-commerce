<head>
    <title>Vegefoods - Register</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link href="https://fonts.googleapis.com/css?family=Poppins:200,300,400,500,600,700,800&display=swap"

    <link href="https://fonts.googleapis.com/css?family=Lora:400,400i,700,700i&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Amatic+SC:400,700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/open-iconic-bootstrap.min.css">

    <link rel="stylesheet" href="css/aos.css">

    <link rel="stylesheet" href="css/ionicons.min.css">

    <link rel="stylesheet" href="css/bootstrap-datepicker.css">
    <link rel="stylesheet" href="css/jquery.timepicker.css">


    <link rel="stylesheet" href="css/flaticon.css">
    <link rel="stylesheet" href="css/icomoon.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="goto-here">
    <div class="py-1 bg-primary">
        <div class="container">
            <div class="row no-gutters d-flex align-items-start align-items-center px-md-0">
                <div class="col-lg-12 d-block">
                    <div class="row d-flex">
                        <div class="col-md pr-4 d-flex topper align-items-center">
                            <div class="icon mr-2 d-flex justify-content-center align-items-center"><span
                                    class="icon-phone2"></span></div>
                            <span class="text">+ 1235 2355 98</span>
                        </div>
                        <div class="col-md pr-4 d-flex topper align-items-center">
                            <div class="icon mr-2 d-flex justify-content-center align-items-center"><span
                                    class="icon-paper-plane"></span></div>
                            <span class="text">youremail@email.com</span>
                        </div>
                        <div class="col-md-5 pr-4 d-flex topper align-items-center text-lg-right">
                            <span class="text">3-5 Business days delivery &amp; Free Returns</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <nav class="navbar navbar-expand-lg navbar-dark ftco_navbar bg-dark ftco-navbar-light" id="ftco-navbar">
        <div class="container">
            <a class="navbar-brand" href="index.html">Vegefoods</a>
            <div class="collapse navbar-collapse" id="ftco-nav">
                <ul class="navbar-nav ml-auto">
                    <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
                    <li class="nav-item"><a href="shop.html" class="nav-link">Shop</a></li>
                    <li class="nav-item"><a href="login.html" class="nav-link">Login</a></li>
                    <li class="nav-item active"><a href="register.html" class="nav-link">Register</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Breadcrumb Header[cite: 2] -->
    <div class="hero-wrap hero-bread" style="background-image: url('images/bg_1.jpg');">
        <div class="container">
            <div class="row no-gutters slider-text align-items-center justify-content-center">
                <div class="col-md-9 ftco-animate text-center">
                    <p class="breadcrumbs"><span class="mr-2"><a href="index.html">Home</a></span> <span>Register</span>
                    </p>
                    <h1 class="mb-0 bread">Create Account</h1>
                </div>
            </div>
        </div>
    </div>

    <!-- Registration Form Section -->
    <!-- Inside register.html[cite: 2] -->
    <section class="ftco-section contact-section bg-light">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6 d-flex">
                    <form id="registerForm" class="bg-white p-5 contact-form">
                        <div class="form-group">
                            <input type="text" id="first_name" class="form-control" placeholder="Full Name" required>
                        </div>
                        <div class="form-group">
                            <input type="email" id="email" class="form-control" placeholder="Email (Username)" required>
                        </div>
                        <div class="form-group">
                            <input type="password" id="password" class="form-control" placeholder="Password" required>
                            <small class="form-text text-muted">Min 8 chars, 1 uppercase, 1 special (!@#$%^&*)</small>
                        </div>
                        <div class="form-group">
                            <input type="submit" value="Register" class="btn btn-primary py-3 px-5 w-100">
                        </div>
                        <div id="regMessage" class="mt-3 text-center"></div>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <!-- Registration Logic -->
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            // 1. Capture Input Data
            const first_name = document.getElementById('first_name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('regMessage');

            // 2. Frontend Validation (Assignment Requirements)
            // Rules: Min 8 chars, at least one special char, at least one uppercase char
            const hasUpper = /[A-Z]/.test(password);
            const hasSpecial = /[!@#$%^&*]/.test(password);
            const validLength = password.length >= 8;

            if (!validLength || !hasUpper || !hasSpecial) {
                messageDiv.innerHTML = `<span class="text-danger">
            Password must be 8+ chars with 1 uppercase and 1 special char.
        </span>`;
                return;
            }

            try {
                // 3. Send the Data to the Backend API
                const response = await fetch('http://localhost:3000/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ first_name, email, password })
                });

                const data = await response.json();

                // 4. THE REDIRECT LOGIC
                if (response.status === 201) {
                    // Success Case: User is now in auth_user.json[cite: 5]
                    messageDiv.innerHTML = `<span class="text-success">
                Registration successful! Redirecting to login...
            </span>`;

                    // Wait 2 seconds so the user can read the success message
                    setTimeout(() => {
                        window.location.href = 'login.html'; // Move to Login page[cite: 2]
                    }, 2000);

                } else {
                    // Fail Case: Backend rejected the request (e.g., user exists)[cite: 5]
                    messageDiv.innerHTML = `<span class="text-danger">${data.message}</span>`;
                }

            } catch (err) {
                // Error Case: Server is down or network failed
                messageDiv.innerHTML = `<span class="text-danger">
            Error: Connection to server failed.
        </span>`;
            }
        });
    </script>
</body>

</html>
